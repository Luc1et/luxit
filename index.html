<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LUXIT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>
    <div class="grain"></div>
  </div>

  <main class="stage">
    <section class="card" id="card">
      <div class="grid">
        <!-- TL: logo -->
        <div class="cell cell-logo" data-reveal>
          <div class="logo-wrap" id="logoWrap">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <img class="logo" src="assets/images/logo-luxit.png" alt="LUXIT logo" />
          </div>
        </div>

        <!-- TR: main text -->
        <div class="cell cell-hero" data-reveal data-delay="70">
          <p class="hero">
            Pomáhám s weby, aplikacemi a čímkoli, co vás zrovna v digitálním světě pálí.
          </p>
        </div>

        <!-- BL: small text -->
        <div class="cell cell-note" data-reveal data-delay="120">
          <p class="note">
            Tento web slouží jako jednoduchý rozcestník projektů a aplikací.<br>
            Projekty a aplikace budou postupně doplňovány.
          </p>
        </div>

        <!-- BR: email pill -->
        <div class="cell cell-cta" data-reveal data-delay="170">
          <a class="pill" href="mailto:lucie@luxit.cz">
            <span class="pill-text">lucie@luxit.cz</span>
            <span class="pill-arrow" aria-hidden="true">→</span>
          </a>
        </div>
      </div>
    </section>

    <footer class="foot">
      <span>© <span id="year"></span> · LUXIT</span>
    </footer>
  </main>

  <script src="main.js"></script>
</body>
</html>
