<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LUXIT</title>
  <meta name="description" content="Pomáhám s weby, aplikacemi a čímkoli, co vás zrovna v digitálním světě pálí." />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Vibe background přes CELÝ viewport -->
  <div class="bg-layer bg-layer--one" aria-hidden="true"></div>
  <div class="bg-layer bg-layer--two" aria-hidden="true"></div>

  <main class="page">
    <section class="card">
      <div class="grid">
        <!-- (1,1) Logo -->
        <div class="cell cell--logo">
          <a class="logo-link" href="/" aria-label="LUXIT">
            <!-- Uprav cestu na tvoje logo z původního webu -->
            <img class="logo" src="assets/images/logo-luxit.png" alt="LUXIT" />
          </a>
        </div>

        <!-- (1,2) Jedna věta -->
        <div class="cell cell--headline" data-animate="fade-up">
          <p class="headline">
            Pomáhám s weby, aplikacemi a čímkoli, co vás zrovna v digitálním světě pálí.
          </p>
        </div>

        <!-- (2,1) Info -->
        <div class="cell cell--info" data-animate="fade-up">
          <p class="info">
            Tento web slouží jako jednoduchý rozcestník projektů a aplikací.
          </p>
          <p class="info info--soft">
            Projekty a aplikace budou postupně doplňovány.
          </p>
        </div>

        <!-- (2,2) Kontakt (jen email) -->
        <div class="cell cell--contact" data-animate="fade-up">
          <a class="email" href="mailto:lucie@luxit.cz">lucie@luxit.cz</a>
        </div>
      </div>
    </section>

    <footer class="footer" data-animate="fade-up">
      <p>© <span id="year">2026</span> · LUXIT</p>
    </footer>
  </main>

  <script src="main.js" defer></script>
</body>
</html>
