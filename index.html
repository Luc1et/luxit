<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LUXIT · Lucie</title>
  <meta name="description" content="Pomoc s technikou, aplikacemi a digitálními věcmi, které zrovna potřebujete vyřešit." />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Jemné “wash” pozadí (vibe, ale pořád decentní) -->
  <div class="bg-layer bg-layer--one" aria-hidden="true"></div>
  <div class="bg-layer bg-layer--two" aria-hidden="true"></div>

  <main class="page">
    <header class="top" data-animate="fade-up">
      <h1 class="brand">LUXIT</h1>
      <p class="name">Lucie</p>
    </header>

    <section class="content" aria-label="Vizitka" data-animate="fade-up">
      <p class="claim">
        Pomoc s technikou, aplikacemi a digitálními věcmi, které zrovna potřebujete vyřešit.
      </p>

      <p class="sub">
        Tento web slouží jako jednoduchý rozcestník mých projektů a aplikací.
      </p>

      <div class="projects" data-animate="fade-up">
        <p class="projects-text">
          Projekty a aplikace budou postupně doplňovány.
        </p>
      </div>

      <div class="contact" data-animate="fade-up">
        <p class="contact-label">Kontakt</p>
        <a class="contact-link" href="mailto:lucie@luxit.cz">lucie@luxit.cz</a>
      </div>
    </section>

    <footer class="footer" data-animate="fade-up">
      <p>© <span id="year">2026</span> · Lucie</p>
    </footer>
  </main>

  <script src="main.js" defer></script>
</body>
</html>
